<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gwint Online, Player vs Player (Fan project) (Beta)</title>
    <!-- Opis strony dla wyszukiwarek -->
    <meta name="description"
        content="Zagraj w Gwint Online 1v1 z przyjaciółmi! Stwórz lub dołącz do gry, całość działa bardzo podobnie co w Wiedzmine 3">
    <!-- Tag weryfikacyjny Google -->
    <meta name="google-site-verification" content="hLf1PX-1fD-PLj-3HAYo-pzLykQeqSmrrMrvrvE-lM8" />
    <meta name="keywords"
        content="Gwint, Gwint Online, Gwint 1v1, Wiedźmin 3, Witcher 3, gra karciana, card game, Gwent">
    <!-- Open Graph -->
    <meta property="og:title" content="Gwint Online (Beta) (Fan project)">
    <meta property="og:description" content="Zagraj w Gwint Online 1v1 z przyjaciółmi! Stwórz lub dołącz do gry.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://gwent-1vs1.onrender.com/">
    <meta property="og:image" content="/assets/zdlink.jpg">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tagesschrift:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/icons/favicon.ico">
    <link rel="icon" type="image/png" href="/icons/favicon-16x16.png" sizes="16x16">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">

    <script src="/socket.io/socket.io.js"></script>
    <script src="tryby.js"></script>
    <script src="script.js" defer></script>
</head>

<body>
    <div id="toast-container"></div>
    <!-- Strona A: Menu główne -->
    <div class="main-menu" id="mainMenu">
        <!-- Linia na całą szerokość -->
        <div class="menu-line"></div>

        <img src="assets/boklewy.png" class="side-bar left-bar" alt="Lewy bok">
        <img src="assets/bokprawy.png" class="side-bar right-bar" alt="Prawy bok">

        <!-- Główny kontener wspólnie wyśrodkowany -->
        <div class="content-container" id="contentContainer">
            <div class="menu-wrapper">
                <img src="assets/srodekmenuw.png" class="center-menu" alt="Menu">
                <div class="button-container">
                    <div class="menu-button play-button" onclick="showHostScreen()">
                        <img src="assets/ramka.png" class="hover-frame" alt="Ramka">
                    </div>
                    <div class="menu-button test-menu-button" onclick="startTestGame()">
                        <img src="assets/ramka.png" class="hover-frame" alt="Ramka">
                    </div>
                    <div class="menu-button discord-menu-button"
                        onclick="window.open('https://discord.gg/vs9tnnmNAD', '_blank')">
                        <img src="assets/ramka.png" class="hover-frame" alt="Ramka">
                    </div>
                    <div class="menu-button info-menu-button" onclick="window.location.href='info.html'">
                        <img src="assets/ramka.png" class="hover-frame" alt="Ramka">
                    </div>
                </div>
                <div class="menu-text-overlay">
                    <div class="menu-label-play">Graj</div>
                    <div class="menu-label-test">Test Game</div>
                    <div class="menu-label-discord">Discord</div>
                    <div class="menu-label-info">Info Alpha 8.0</div>
                </div>
            </div>

            <div id="sidePanel" class="side-panel">
                <div id="gameSetup" class="setup-container wybor-mode-container">
                    <!-- Ukryty obrazek do załadowania dla naturalnych rozmiarów -->
                    <img src="assets/wybor.webp" id="wyborBgImg" class="wybor-bg" alt="Tryby">
                    <div id="wyborPixelCanvas" class="wybor-pixel-canvas">
                        <!-- Top Bar kafelki (<141) -->
                        <div id="modeCarousel" class="mode-carousel">
                            <!-- mode items injected via JS -->
                        </div>

                        <!-- Środek-Lewo (Opis) 281, 146 x 738, 326 -->
                        <div id="modeDescriptionArea" class="mode-desc">
                            <span id="modePreviewText">Opis trybu</span>
                        </div>

                        <!-- Środek-Prawo (Obraz trybu) 845, 153 x 1141, 322 -->
                        <div id="modeImageArea" class="mode-image">
                            <img id="modePreviewImg" src="assets/wybory.webp" alt="Podgląd">
                        </div>

                        <!-- Pasek na dole, Y=346 -->
                        <div id="modeBottomBar" class="mode-bottom">
                            <img src="assets/kod pasek.webp" class="pasek-bg" alt="Pasek">

                            <!-- 274, 348 x 733, 407 (pozycja bezwg na canvas) -->
                            <div class="code-generator">
                                <img src="assets/reload.webp" class="reload-btn" onclick="resetLobby()"
                                    title="Resetuje lobby i kod" alt="Reset">
                                <span id="displayCode" class="lobby-code">TWÓJ KOD ######</span>
                                <img src="assets/coppy.webp" class="icon-btn copy-btn" onclick="copyCodeToClipboard()"
                                    title="Kopiuj kod" alt="Copy">
                            </div>

                            <!-- 751, 348 x 1204, 407 -->
                            <div class="join-area">
                                <span>DOŁĄCZ: </span>
                                <div class="input-wrapper">
                                    <input type="text" id="sideCodeInput" placeholder="KOD">
                                    <img src="assets/paset.webp" class="inner-paste-btn"
                                        onclick="pasteCodeFromClipboard()" title="Wklej kod" alt="Paste">
                                </div>
                                <img src="assets/accept.webp" class="icon-btn accept-btn" onclick="joinOrStartGame()"
                                    title="Dołącz" alt="Accept">
                            </div>

                            <div class="player-entry-area">
                                <input type="text" id="nicknameInput" placeholder="NICK">
                                <button onclick="requestStartGame()" id="startGameBtn" class="game-btn">START /
                                    DOŁĄCZ</button>
                                <button onclick="toggleReady()" id="readyBtn" class="game-btn">GOTOWY</button>
                                <div class="status-indicator" id="p2Status">Status...</div>
                            </div>
                        </div>

                        <div class="side-back-button" onclick="goBackToMain()">
                            Powrót
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="testGameMsg"
            style="color:#c7a76e; font-family:'PFDinTextCondPro-Bold',serif; font-size:1.2em; text-align:center; position: absolute; bottom: 10px; width: 100%;">
        </div>
    </div>



    <!-- Ekran gry -->
    <div id="gameScreen" class="screen">
        <div class="game-content">
            <h2>Stan gry</h2>
            <p>Host: <span id="hostNickname">...</span></p>
            <p>Przeciwnik: <span id="opponentNickname">...</span></p>
        </div>
    </div>

    <!-- Przycisk Pełnego Ekranu -->
    <div id="fullScreenBtn" class="fullscreen-btn" onclick="toggleFullScreen()" title="Tryb pełnoekranowy">
        <img src="assets/powiek.webp" id="fsIcon" alt="Fullscreen">
    </div>

    <!-- Informacja dla telefonów -->
    <div id="mobileWarning" class="mobile-warning">
        <div class="warning-box">
            <p>Dla najlepszego doświadczenia używaj Gwinta w trybie pełnoekranowym i poziomie (bokiem).</p>
            <div class="warning-buttons">
                <button onclick="setupMobileGame()" class="gold-btn">USTAW</button>
                <button onclick="closeWarning()">ROZUMIEM</button>
            </div>
        </div>
    </div>
</body>

</html>
